name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t harshdocker608/devops-app .

      - name: Push Docker Image
        run: docker push harshdocker608/devops-app

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: 34.229.153.41
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker rm -f $(docker ps -aq) || true
            docker pull harshdocker608/devops-app
            docker run -d -p 3000:3000 harshdocker608/devops-app